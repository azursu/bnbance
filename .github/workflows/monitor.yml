name: 币安行情监控
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install requests
      - name: 运行脚本
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python monitor.py
